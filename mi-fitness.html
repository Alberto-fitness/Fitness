<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Fitness">
<meta name="theme-color" content="#0A0A0A">
<title>Mi Plan Fitness</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjMEEwQTBBIi8+PHRleHQgeD0iOTAiIHk9IjEyMCIgZm9udC1zaXplPSI5MCIgdGV4dC1hbmNob3I9Im1pZGRsZSI+8J+SqjwvdGV4dD48L3N2Zz4=">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --G: #A8E63D; --Gd: #6B9E1F; --Gbg: rgba(168,230,61,.12);
  --O: #F97316; --Obg: rgba(249,115,22,.12);
  --B: #60A5FA; --Bbg: rgba(96,165,250,.12);
  --P: #C084FC; --Y: #FFD700;
  --BG: #0A0A0A; --CARD: #161616; --BOR: #252525;
  --TXT: #FFFFFF; --MUT: #888888; --DIM: #2D2D2D;
  --SHADOW: 0 4px 16px rgba(0,0,0,.25), 0 1px 3px rgba(0,0,0,.4);
  --SHADOW-G: 0 4px 16px rgba(168,230,61,.18);
  --EASE: cubic-bezier(.4,0,.2,1);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--BG); color: var(--TXT); font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; font-feature-settings: 'cv11', 'ss01'; -webkit-font-smoothing: antialiased; }
body { padding-bottom: calc(84px + env(safe-area-inset-bottom)); padding-top: env(safe-area-inset-top); }
button, input, select, textarea { font-family: inherit; outline: none; }
input:focus, select:focus, textarea:focus { border-color: var(--G) !important; box-shadow: 0 0 0 3px rgba(168,230,61,.15); }
.card { background: linear-gradient(180deg, #181818 0%, #141414 100%); border-radius: 16px; border: 1px solid var(--BOR); padding: 16px 18px; margin-bottom: 12px; box-shadow: var(--SHADOW); animation: cardIn .35s var(--EASE); }
@keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.lbl { font-size: 11px; color: var(--MUT); font-weight: 700; letter-spacing: 0.6px; margin-bottom: 12px; text-transform: uppercase; }
.inp { width: 100%; background: #1E1E1E; border: 1px solid var(--BOR); border-radius: 12px; padding: 12px 14px; font-size: 15px; color: var(--TXT); transition: all .2s var(--EASE); }
.btn { cursor: pointer; border: none; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 500; background: #1E1E1E; color: var(--TXT); transition: all .2s var(--EASE); border: 1px solid var(--BOR); }
.btn:hover { background: #252525; }
.btn-pri { background: var(--G); color: #000; font-weight: 700; border-color: var(--G); box-shadow: var(--SHADOW-G); }
.btn-pri:hover { background: #B5EE52; }
.btn-pri:active, .btn:active { transform: scale(.97); }
.header { background: rgba(17,17,17,.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 12px 16px; border-bottom: 1px solid var(--BOR); display: flex; justify-content: space-between; align-items: center; position: sticky; top: env(safe-area-inset-top); z-index: 50; }
.streak-badge { display: flex; flex-direction: column; align-items: center; background: rgba(255,215,0,.13); border: 1px solid rgba(255,215,0,.3); border-radius: 10px; padding: 4px 9px; animation: streakPulse 2.5s ease-in-out infinite; }
@keyframes streakPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,215,0,.25); } 50% { box-shadow: 0 0 0 6px rgba(255,215,0,0); } }
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(17,17,17,.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--BOR); display: flex; z-index: 100; padding: 8px 0 calc(14px + env(safe-area-inset-bottom)); }
.tab-btn { flex: 1; background: none; border: none; cursor: pointer; color: var(--MUT); display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; padding: 2px 0; transition: color .2s var(--EASE); font-weight: 500; }
.tab-btn.active { color: var(--G); font-weight: 700; }
.tab-btn .ic { font-size: 22px; transition: transform .2s var(--EASE); }
.tab-btn.active .ic { transform: scale(1.1); }
.screen { display: none; padding: 16px 16px 12px; animation: screenIn .3s var(--EASE); }
.screen.active { display: block; }
@keyframes screenIn { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: translateX(0); } }
.badge-green { background: var(--Gbg); color: var(--G); border: 1px solid rgba(107,158,31,.3); border-radius: 20px; padding: 4px 11px; font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; }
.badge-orange { background: var(--Obg); color: var(--O); border: 1px solid rgba(249,115,22,.3); border-radius: 20px; padding: 4px 11px; font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; }
.prog-bar { background: #222; border-radius: 4px; height: 8px; overflow: hidden; }
.prog-bar div { height: 100%; background: linear-gradient(90deg, var(--Gd), var(--G)); border-radius: 4px; transition: width .6s var(--EASE); }
.ex-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--BOR); cursor: pointer; transition: background .15s var(--EASE); border-radius: 8px; }
.ex-row:active { background: rgba(255,255,255,.02); }
.ex-check { width: 26px; height: 26px; border-radius: 13px; border: 2px solid #444; background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .25s var(--EASE); }
.ex-check.done { background: var(--G); border-color: var(--G); color: #000; font-size: 13px; font-weight: 900; box-shadow: 0 0 0 4px rgba(168,230,61,.15); animation: checkPop .35s var(--EASE); }
@keyframes checkPop { 0% { transform: scale(.5); } 60% { transform: scale(1.15); } 100% { transform: scale(1); } }
.ex-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ex-done .ex-name { opacity: 0.4; text-decoration: line-through; }
.ex-mus { font-size: 11px; color: var(--MUT); margin-top: 2px; }
.ex-sets { font-size: 13px; color: var(--G); font-weight: 700; white-space: nowrap; }
.timer-card { background: linear-gradient(135deg, rgba(249,115,22,.18), rgba(249,115,22,.08)); border: 1px solid rgba(249,115,22,.3); margin: 10px 16px 0; border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 16px rgba(249,115,22,.15); }
.workout-timer { background: linear-gradient(135deg, rgba(168,230,61,.15), rgba(168,230,61,.05)); border: 1px solid rgba(168,230,61,.3); margin: 10px 16px 0; border-radius: 14px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 16px rgba(168,230,61,.1); }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; display: none; align-items: flex-end; padding-bottom: env(safe-area-inset-bottom); }
.modal-bg.show { display: flex; animation: modalFade .25s var(--EASE); }
@keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
.modal-box { background: linear-gradient(180deg, #1E1E1E, #161616); border-radius: 22px 22px 0 0; padding: 22px; width: 100%; max-height: 88vh; overflow-y: auto; animation: modalSlide .35s var(--EASE); box-shadow: 0 -8px 32px rgba(0,0,0,.5); }
@keyframes modalSlide { from { transform: translateY(40px); } to { transform: translateY(0); } }
.day-cell { aspect-ratio: 1; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 1.5px solid var(--BOR); transition: transform .15s var(--EASE); }
.day-cell:active { transform: scale(.94); }
.day-cell.F { background: linear-gradient(135deg, #1F3514, #14250B); }
.day-cell.C, .day-cell.B { background: linear-gradient(135deg, #2F1E0E, #1F1207); }
.day-cell.D { background: #1A1A1A; }
.day-cell.today { border-color: var(--O); box-shadow: 0 0 0 2px rgba(249,115,22,.2); }
.day-cell.sel { border-color: var(--G); box-shadow: 0 0 0 2px rgba(168,230,61,.25); }
.body-svg-wrap { display: flex; gap: 12px; justify-content: center; padding: 16px 0; background: radial-gradient(ellipse at center, #161616, #0A0A0A); border-radius: 14px; }
.body-svg-wrap > div { text-align: center; }
.body-svg-wrap svg { width: 110px; height: 220px; filter: drop-shadow(0 2px 8px rgba(0,0,0,.3)); }
.body-svg-wrap .body-label { font-size: 10px; color: var(--MUT); margin-top: -6px; font-weight: 700; letter-spacing: 1px; }
.toast { position: fixed; top: calc(70px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%) translateY(-10px); background: var(--G); color: #000; padding: 11px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; z-index: 300; box-shadow: 0 8px 24px rgba(168,230,61,.4); opacity: 0; transition: all .3s var(--EASE); pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.chart-wrap { position: relative; height: 170px; margin-top: 16px; }
textarea { resize: vertical; min-height: 50px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.stat-cell { text-align: center; padding: 8px 4px; border-radius: 10px; background: rgba(255,255,255,.02); }
.stat-cell .val { font-size: 24px; font-weight: 800; line-height: 1; margin-bottom: 4px; letter-spacing: -0.5px; }
.stat-cell .lbl-sm { font-size: 9px; color: var(--MUT); font-weight: 600; letter-spacing: 0.5px; }
.goal-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--BOR); }
.goal-row:last-child { border-bottom: none; }
.goal-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.goal-info { flex: 1; min-width: 0; }
.goal-info .t { font-size: 13px; font-weight: 600; }
.goal-info .s { font-size: 11px; color: var(--MUT); margin-top: 2px; }
.goal-bar { width: 80px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; flex-shrink: 0; }
.goal-bar div { height: 100%; background: var(--G); border-radius: 3px; transition: width .5s var(--EASE); }
.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.photo-cell { aspect-ratio: 1; background: var(--BOR); border-radius: 10px; overflow: hidden; cursor: pointer; position: relative; }
.photo-cell img { width: 100%; height: 100%; object-fit: cover; }
.photo-date { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(0deg, rgba(0,0,0,.85), transparent); color: #FFF; font-size: 9px; padding: 12px 4px 4px; text-align: center; font-weight: 600; }
.subs-btn { font-size: 11px; color: var(--MUT); background: rgba(255,255,255,.04); border: 1px solid var(--BOR); padding: 5px 10px; border-radius: 8px; cursor: pointer; margin-top: 6px; transition: all .15s var(--EASE); }
.subs-btn:active { background: rgba(255,255,255,.08); transform: scale(.96); }
.subs-list { background: rgba(168,230,61,.04); border: 1px solid rgba(168,230,61,.15); border-radius: 10px; padding: 10px; margin-top: 6px; font-size: 12px; }
.subs-list .sub-item { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
.subs-list .sub-item:last-child { border-bottom: none; }
.subs-list .sub-name { color: var(--TXT); font-weight: 600; }
.subs-list .sub-note { color: var(--MUT); font-size: 11px; margin-top: 1px; }
.rpe-btn { aspect-ratio: 1; max-width: 38px; border-radius: 10px; border: 1.5px solid var(--BOR); background: #1E1E1E; color: var(--MUT); cursor: pointer; font-size: 13px; font-weight: 700; transition: all .15s var(--EASE); padding: 0; }
.rpe-btn.active { background: var(--G); color: #000; border-color: var(--G); transform: scale(1.05); }
.rpe-row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
.fab-export { display: flex; gap: 8px; }
.success-hero { text-align: center; padding: 24px 16px; background: linear-gradient(135deg, rgba(168,230,61,.15), rgba(168,230,61,.04)); border: 1px solid rgba(168,230,61,.3); border-radius: 16px; margin-bottom: 12px; box-shadow: var(--SHADOW-G); }
.success-hero .emoji { font-size: 48px; margin-bottom: 8px; animation: bounce 1s var(--EASE); }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div style="min-width:0">
    <div id="dateText" style="font-size:11px;color:var(--MUT);text-transform:capitalize"></div>
    <div style="font-size:17px;font-weight:800;letter-spacing:-0.5px">Mi Plan Fitness</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
    <div id="streakBadge" class="streak-badge" style="display:none">
      <div style="font-size:14px;font-weight:800;color:#FFD700"><span id="streakNum">0</span></div>
      <div style="font-size:8px;color:#FFD700">RACHA</div>
    </div>
    <span id="weekBadge" class="badge-green" style="display:none;padding:3px 8px;border-radius:8px;font-size:11px"></span>
    <div style="text-align:right">
      <div style="font-size:15px;font-weight:800;color:var(--G)"><span id="weightDisplay">82</span>kg</div>
      <div style="font-size:9px;color:var(--MUT)">→ 74kg</div>
    </div>
  </div>
</div>

<!-- WORKOUT TIMER (total entreno) -->
<div id="workoutTimer" class="workout-timer" style="display:none">
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:20px">⏲️</span>
    <div>
      <div style="font-size:10px;color:var(--G);font-weight:700;letter-spacing:1px">ENTRENO EN CURSO</div>
      <div id="workoutTimerDisplay" style="font-size:18px;font-weight:800;font-variant-numeric:tabular-nums">00:00</div>
    </div>
  </div>
  <button class="btn" onclick="endWorkout(true)" style="padding:6px 12px;font-size:12px">Terminar</button>
</div>

<!-- REST TIMER -->
<div id="restTimer" class="timer-card" style="display:none">
  <div>
    <div style="font-size:10px;color:var(--O);font-weight:700;letter-spacing:1px">⏱ DESCANSO</div>
    <div id="timerDisplay" style="font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1">01:30</div>
  </div>
  <div style="display:flex;gap:6px">
    <button class="btn" onclick="startTimer(60)" style="padding:6px 10px;font-size:12px">60s</button>
    <button class="btn" onclick="startTimer(90)" style="padding:6px 10px;font-size:12px">90s</button>
    <button class="btn" onclick="clearTimer()" style="padding:6px 10px;font-size:12px;color:var(--MUT)">✕</button>
  </div>
</div>

<!-- SCREENS -->
<div class="screen active" id="screen-hoy"></div>
<div class="screen" id="screen-plan"></div>
<div class="screen" id="screen-prog"></div>
<div class="screen" id="screen-log"></div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="hoy" onclick="setTab('hoy')"><span class="ic">🏠</span><span>Hoy</span></button>
  <button class="tab-btn" data-tab="plan" onclick="setTab('plan')"><span class="ic">📅</span><span>Plan</span></button>
  <button class="tab-btn" data-tab="prog" onclick="setTab('prog')"><span class="ic">📈</span><span>Progreso</span></button>
  <button class="tab-btn" data-tab="log" onclick="setTab('log')"><span class="ic">✏️</span><span>Anotar</span></button>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;margin-bottom:14px;gap:8px">
      <div id="modalTitle" style="font-size:16px;font-weight:700;flex:1"></div>
      <button class="btn" onclick="closeModal()" style="width:30px;height:30px;padding:0;border-radius:8px;color:var(--MUT)">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================================
// DATA
// ============================================================================
const START = new Date(2026, 4, 11);
const G = "#A8E63D", Gd = "#6B9E1F", O = "#F97316", B = "#60A5FA", P = "#C084FC", DIM = "#2D2D2D", MUT = "#888888", BOR = "#252525";

const EX = {
  pressBanca: { n: "Press Banca con Mancuernas", m: "Pecho · Tríceps · Hombros", mus: ["chest","triceps","shoulders"], tip: "Túmbate en el banco, mancuernas al pecho con codos a 45°. Empuja explosivo hacia arriba. Escápulas apretadas contra el banco. Baja 3 segundos, sube rápido." },
  pressMilitar: { n: "Press Militar Mancuernas", m: "Hombros · Tríceps", mus: ["shoulders","triceps"], tip: "De pie o sentado, mancuernas a la altura de los hombros. Empuja directamente hacia arriba. Core activo, sin arquear la lumbar." },
  fondos: { n: "Fondos en Banco", m: "Tríceps · Hombros · Pecho", mus: ["triceps","shoulders","chest"], tip: "Manos en el borde del banco detrás del cuerpo, piernas estiradas. Baja hasta 90° de codo. Empuja. Mantén el cuerpo pegado al banco." },
  aperturas: { n: "Aperturas con Mancuernas", m: "Pecho · Hombros ant.", mus: ["chest","shoulders"], tip: "Tumbado en banco, baja con el codo ligeramente flexionado como si abrazaras un árbol. Siente el estiramiento profundo del pecho abajo." },
  triceps: { n: "Extensión Tríceps (Elástica)", m: "Tríceps", mus: ["triceps"], tip: "Elástica anclada en alto. Codos pegados al cuerpo y quietos. Extiende completamente. Aprieta el tríceps al final del movimiento." },
  sentadilla: { n: "Sentadilla Barra / Mancuernas", m: "Cuádriceps · Glúteos · Core", mus: ["quads","glutes","abs"], tip: "Pies a anchura de hombros, puntas ligeramente abiertas. Baja hasta muslos paralelos. Rodillas siguen la línea de los pies. Empuja con los talones." },
  pesoMuerto: { n: "Peso Muerto Rumano", m: "Isquios · Glúteos · Lumbar", mus: ["hamstrings","glutes","back"], tip: "Espalda neutra. Desliza las mancuernas por las piernas llevando las caderas atrás. Siente el estiramiento en isquios. Empuja caderas adelante para subir." },
  zancadas: { n: "Zancadas con Mancuernas", m: "Cuádriceps · Glúteos", mus: ["quads","glutes"], tip: "Paso largo adelante, rodilla trasera casi toca el suelo. Rodilla delantera no pasa el pie. Empuja con el talón delantero para volver." },
  swing: { n: "Swing Kettlebell", m: "Glúteos · Isquios · Core", mus: ["glutes","hamstrings","abs","back"], tip: "Impulso desde las caderas, no los brazos. Flexiona rodillas, pasa la kettlebell entre piernas. Extiende caderas explosivamente. Aprieta glúteos en la cima." },
  plancha: { n: "Plancha", m: "Core · Lumbar · Estabilizadores", mus: ["abs","back"], tip: "Cuerpo recto de cabeza a talones. No caigas de caderas ni subas el trasero. Aprieta abdomen, glúteos y cuádriceps. Respira controlado." },
  crunch: { n: "Crunch Bicicleta", m: "Abdomen · Oblicuos", mus: ["abs"], tip: "Codo derecho a rodilla izquierda y viceversa. Lento y controlado, sin tirar del cuello con las manos." },
  dominadas: { n: "Dominadas en Barra", m: "Espalda · Bíceps · Core", mus: ["back","biceps","abs"], tip: "Si no aguantas el peso corporal, usa la elástica de ayuda. Baja completamente entre reps. Tira los codos hacia las caderas para subir." },
  remo: { n: "Remo con Mancuerna", m: "Espalda · Bíceps", mus: ["back","biceps"], tip: "Apoya mano y rodilla contraria en el banco. Espalda paralela al suelo. Tira hacia la cadera (no el hombro). Aprieta la espalda arriba." },
  curl: { n: "Curl Bíceps Mancuernas", m: "Bíceps", mus: ["biceps"], tip: "Codos pegados al cuerpo y quietos. Sube 2 segundos, baja 3 segundos. Rango completo. Supina la muñeca al subir." },
  facePull: { n: "Face Pull (Elástica)", m: "Hombro post. · Manguito", mus: ["shoulders","back"], tip: "Elástica a la altura de la cara. Codos en alto. Tira hacia atrás separando las manos. Fundamental para la salud del hombro." },
  encog: { n: "Encogimientos de Hombros", m: "Trapecios", mus: ["traps"], tip: "Sube hombros hacia las orejas, mantén 1-2 segundos arriba. Baja lento y controlado. Sin girar los hombros." },
};

// Sustituciones de ejercicios (alternativas si no tienes equipamiento o duele algo)
const SUBS = {
  pressBanca: [
    { n: "Press inclinado mancuernas", note: "Más énfasis en pecho superior" },
    { n: "Flexiones (pies elevados)", note: "Si no tienes mancuernas" },
    { n: "Press suelo con mancuernas", note: "Si no hay banco disponible" }
  ],
  pressMilitar: [

// ============================================================================

// ============================================================================
function wn(d) { return Math.floor((new Date(d) - START) / (7 * 86400000)); }
function dow(d) { const x = new Date(d).getDay(); return x === 0 ? 6 : x - 1; }
function ds(d) { return new Date(d).toISOString().split("T")[0]; }
function addD(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function getPlan(date) {
  const w = wn(date); if (w < 0 || w > 7) return null;
  return { ...PLAN[dow(date)], weekN: w, dow: dow(date) };
}
function esc(s) { return String(s || "").replace(/[<>"']/g, c => ({ '<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

function hydrationCard(dateStr) {

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span class="lbl">💧 Hidratación</span>

    </div>

  for (let i = 0; i < 8; i++) {

    html += `<button onclick="toggleHydration('${dateStr}',${i+1})" style="aspect-ratio:1;border-radius:8px;border:1.5px solid ${filled?'var(--B)':'var(--BOR)'};background:${filled?'rgba(96,165,250,.12)':'transparent'};cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0">${filled?'💧':''}</button>`;

  return html;
}

function workoutCard(plan, dateStr) {
  const doneIds = S.done[dateStr] || [];
  if (plan.type === "F") {
    const total = plan.ex.length;
    const nDone = doneIds.filter(x => plan.ex.find(e => e.id === x)).length;
    const allDone = nDone === total && total > 0;
    let html = `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span class="badge-green">💪 ${esc(plan.label)}</span>
        <span style="font-size:12px;color:${allDone?'var(--G)':'var(--MUT)'};font-weight:${allDone?700:400}">${allDone?'✓ Completado':nDone+'/'+total}</span>
      </div>
      <div class="prog-bar" style="margin-bottom:12px"><div style="width:${total?Math.round(nDone/total*100):0}%"></div></div>`;
    plan.ex.forEach(ex => {
      const info = EX[ex.id];
      const isDone = doneIds.includes(ex.id);
      const subs = SUBS[ex.id] || [];
      html += `<div class="ex-row ${isDone?'ex-done':''}" onclick="openExModal('${ex.id}')">
        <div class="ex-check ${isDone?'done':''}" onclick="event.stopPropagation();toggleDone('${dateStr}','${ex.id}')">${isDone?'✓':''}</div>
        <div style="flex:1;min-width:0">
          <div class="ex-name">${esc(info.n)}</div>
          <div class="ex-mus">${esc(info.m)}</div>
        </div>
        <span class="ex-sets">${ex.s}×${ex.r}</span>
        <span style="color:#444">›</span>
      </div>`;
      if (subs.length) {
        html += `<div style="padding-left:38px;padding-bottom:6px">
          <button class="subs-btn" onclick="event.stopPropagation();toggleSubs('${ex.id}',this)">🔄 Sustituir</button>
          <div class="subs-list" style="display:none">`;
        subs.forEach(s => {
          html += `<div class="sub-item"><div class="sub-name">${esc(s.n)}</div><div class="sub-note">${esc(s.note)}</div></div>`;
        });
        html += `</div></div>`;
      }
    });
    // Mostrar RPE si está marcado
    const rpe = S.rpe[dateStr];
    if (allDone && rpe) {
      html += `<div style="margin-top:10px;padding:10px;background:rgba(168,230,61,.08);border:1px solid rgba(168,230,61,.2);border-radius:10px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--MUT)">Esfuerzo percibido (RPE)</span>
        <span style="font-size:14px;font-weight:700;color:var(--G)">${rpe}/10</span>
      </div>`;
    } else if (allDone) {
      html += `<button class="btn" onclick="openRpeModal('${dateStr}')" style="width:100%;margin-top:10px;font-size:12px">💪 Anotar esfuerzo (RPE)</button>`;
    }
    html += `<div style="margin-top:12px">
      <textarea class="inp" placeholder="¿Cómo te ha ido el entreno? (opcional)" rows="2" oninput="setNote('${dateStr}', this.value)" style="font-size:13px">${esc(S.notes[dateStr]||'')}</textarea>
    </div></div>`;
    return html;
  }
  if (plan.type === "C" || plan.type === "B") {
    const prog = plan.weekN < 8 ? (plan.type === "C" ? CARDIO[plan.weekN] : BIKE[plan.weekN]) : "";
    return `<div class="card">
      <span class="badge-orange">${plan.type==='C'?'🏃':'🚴'} ${esc(plan.label)}</span>
      <div style="margin-top:12px;background:#1E1A14;border-radius:10px;padding:14px">
        <div style="font-size:11px;color:var(--O);font-weight:700;margin-bottom:4px">SEMANA ${plan.weekN+1}</div>
        <div style="font-size:14px;line-height:1.6;color:#EEE">${esc(prog)}</div>
      </div>
      ${plan.type==='C'?'<div style="font-size:12px;color:var(--MUT);margin-top:8px">Calienta 5 min · Enfría 5 min caminando</div>':''}
      <div style="margin-top:10px"><textarea class="inp" placeholder="¿Cómo te has sentido?" rows="2" oninput="setNote('${dateStr}', this.value)" style="font-size:13px">${esc(S.notes[dateStr]||'')}</textarea></div>
    </div>`;
  }
  return `<div class="card"><div style="text-align:center;padding:12px 0">
    <div style="font-size:38px;margin-bottom:6px">${plan.dow===6?'😴':'🧘'}</div>

function weeklyGoalsCard() {

  const sleepDays = S.wellness.filter(w => new Date(w.date) >= weekAgo).length;
  const hydToday = S.hydration[todayStr] || 0;
  const items = [
    { ic: "💪", bg: "rgba(168,230,61,.15)", t: "Entrenos de fuerza", s: `${trainDone}/3 esta semana`, prog: Math.min(100, trainDone/3*100) },
    { ic: "🏃", bg: "rgba(249,115,22,.15)", t: "Cardio acumulado", s: `${cardioMin}/90 min`, prog: Math.min(100, cardioMin/90*100) },
    { ic: "💧", bg: "rgba(96,165,250,.15)", t: "Hidratación hoy", s: `${hydToday}/8 vasos`, prog: Math.min(100, hydToday/8*100) },
    { ic: "📏", bg: "rgba(192,132,252,.15)", t: "Cintura semanal", s: cinturaWeek > 0 ? "✓ medida" : "Pendiente", prog: cinturaWeek > 0 ? 100 : 0 },
    { ic: "😴", bg: "rgba(255,215,0,.15)", t: "Días con sueño anotado", s: `${sleepDays}/7`, prog: Math.min(100, sleepDays/7*100) },
  ];
  let html = `<div class="card"><div class="lbl">🎯 Objetivos de la semana</div>`;
  items.forEach(i => {

function renderHoy() {
  const dateStr = ds(TODAY);
  const plan = getPlan(TODAY);
  let html = "";
  // Si todos los ejercicios del día están hechos, mostrar hero motivador
  if (plan && plan.type === "F" && (S.done[dateStr] || []).length === plan.ex.length) {
    const wt = S.workoutTimes[dateStr];
    const dur = (wt && wt.start && wt.end) ? Math.round((wt.end - wt.start)/60000) : null;
    html += `<div class="success-hero">
      <div class="emoji">🎉</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:4px">¡Entreno completado!</div>
      <div style="font-size:13px;color:#CCC">${dur ? 'Duración: ' + dur + ' min · ' : ''}Toma el batido y a descansar</div>
    </div>`;
  }
  if (!plan) {
    const before = TODAY < START;
    html += `<div class="card"><div style="text-align:center;padding:16px 0">
      <div style="font-size:40px;margin-bottom:8px">🚀</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:6px">${before?'El programa empieza el lunes 11 de mayo':'Programa de 8 semanas completado'}</div>

    </div></div>`;
    html += weeklyGoalsCard() + hydrationCard(dateStr) + photosCard() + mealCard("D");
  } else {
    html += workoutCard(plan, dateStr) + shakeCard(plan) + weeklyGoalsCard() + hydrationCard(dateStr) + photosCard() + mealCard(plan.type);
  }
  document.getElementById("screen-hoy").innerHTML = html;
}

// ACTIONS
// ============================================================================
let _energy = 0;
function setEnergy(n) {
  _energy = n;
  document.querySelectorAll('#energyStars button').forEach((b, i) => {
    const filled = i < n;
    b.textContent = filled ? '★' : '☆';
    b.style.color = filled ? '#FFD700' : 'var(--MUT)';
    b.style.background = filled ? 'rgba(255,215,0,.13)' : 'var(--BOR)';
    b.style.border = filled ? '1px solid #FFD700' : '1px solid var(--BOR)';
  });
}

function toggleDone(dateStr, exId) {
  const cur = S.done[dateStr] || [];
  const plan = getPlan(new Date(dateStr));
  if (cur.includes(exId)) {
    S.done[dateStr] = cur.filter(x => x !== exId);
  } else {
    S.done[dateStr] = [...cur, exId];
    startTimer(90);
    // Inicia cronómetro de entreno si es el primer ejercicio
    if (cur.length === 0 && plan && plan.type === "F") {
      startWorkout(dateStr);
    }
    // Si completa todos, termina el cronómetro y pide RPE
    if (plan && plan.type === "F" && S.done[dateStr].length === plan.ex.length) {
      setTimeout(() => endWorkout(false, dateStr), 300);
    }
  }
  save("done", S.done);
  refreshActiveScreen();
}

// ============================================================================
// WORKOUT TIMER (cronómetro total del entreno)
// ============================================================================
let workoutTimerInterval = null;
function startWorkout(dateStr) {
  if (!S.workoutTimes[dateStr]) S.workoutTimes[dateStr] = {};
  S.workoutTimes[dateStr].start = Date.now();
  save("workoutTimes", S.workoutTimes);
  showWorkoutTimer();
}
function showWorkoutTimer() {
  const todayStr = ds(new Date());
  const wt = S.workoutTimes[todayStr];
  if (!wt || !wt.start || wt.end) {
    document.getElementById("workoutTimer").style.display = "none";
    clearInterval(workoutTimerInterval);
    return;
  }
  document.getElementById("workoutTimer").style.display = "flex";
  clearInterval(workoutTimerInterval);
  const update = () => {
    const secs = Math.floor((Date.now() - wt.start) / 1000);
    const m = String(Math.floor(secs / 60)).padStart(2, "0");
    const s = String(secs % 60).padStart(2, "0");
    document.getElementById("workoutTimerDisplay").textContent = `${m}:${s}`;
  };
  update();
  workoutTimerInterval = setInterval(update, 1000);
}
function endWorkout(showRpe, dateStr) {
  dateStr = dateStr || ds(new Date());
  const wt = S.workoutTimes[dateStr];
  if (wt && wt.start && !wt.end) {
    wt.end = Date.now();
    save("workoutTimes", S.workoutTimes);
  }
  clearInterval(workoutTimerInterval);
  document.getElementById("workoutTimer").style.display = "none";
  if (showRpe !== false) openRpeModal(dateStr);
}

// ============================================================================
// RPE (rating of perceived exertion)
// ============================================================================
function openRpeModal(dateStr) {
  document.getElementById("modalTitle").textContent = "¿Cómo te ha ido el entreno?";
  let html = `<div style="text-align:center;margin-bottom:14px;font-size:13px;color:var(--MUT)">Del 1 (muy fácil) al 10 (al límite)</div>`;
  html += `<div class="rpe-row" id="rpeButtons">`;
  for (let i = 1; i <= 10; i++) {
    html += `<button class="rpe-btn" onclick="setRpe(${i},'${dateStr}')" data-n="${i}">${i}</button>`;
  }
  html += `</div>`;
  html += `<div style="margin-top:14px;font-size:11px;color:var(--MUT);text-align:center">Esto me ayuda a saber si las cargas son las correctas</div>`;
  html += `<button class="btn" onclick="closeModal()" style="width:100%;margin-top:16px">Saltar</button>`;
  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("modal").classList.add("show");
  // Si ya hay RPE para hoy, marcarlo
  if (S.rpe[dateStr]) {
    document.querySelector(`#rpeButtons [data-n="${S.rpe[dateStr]}"]`)?.classList.add("active");
  }
}
function setRpe(n, dateStr) {
  S.rpe[dateStr] = n;
  save("rpe", S.rpe);
  document.querySelectorAll("#rpeButtons .rpe-btn").forEach(b => b.classList.remove("active"));
  document.querySelector(`#rpeButtons [data-n="${n}"]`).classList.add("active");
  setTimeout(() => {
    closeModal();
    toast(`✓ RPE ${n}/10 guardado`);
    refreshActiveScreen();
  }, 400);
}

// ============================================================================
// FOTOS DE PROGRESO
// ============================================================================
function handlePhotoUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const maxW = 700;
      const scale = Math.min(maxW / img.width, 1);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
      S.photos.push({ date: ds(new Date()), data: dataUrl, ts: Date.now() });
      save("photos", S.photos);
      input.value = "";
      toast("📸 Foto guardada");
      refreshActiveScreen();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function openPhotoView(idx) {
  const p = S.photos[idx];
  if (!p) return;
  document.getElementById("modalTitle").textContent = "Foto · " + p.date;
  document.getElementById("modalBody").innerHTML = `
    <img src="${p.data}" style="width:100%;border-radius:12px;display:block">
    <button class="btn" onclick="deletePhoto(${idx})" style="width:100%;margin-top:14px;color:#FF6B6B">🗑 Borrar foto</button>
  `;
  document.getElementById("modal").classList.add("show");
}
function deletePhoto(idx) {
  if (!confirm("¿Borrar esta foto?")) return;
  S.photos.splice(idx, 1);
  save("photos", S.photos);
  closeModal();
  refreshActiveScreen();
  toast("Foto borrada");
}

// ============================================================================
// SUSTITUCIONES
// ============================================================================
function toggleSubs(exId, btnEl) {
  const wrap = btnEl.nextElementSibling;
  if (wrap.style.display === "block") {
    wrap.style.display = "none";
    btnEl.textContent = "🔄 Sustituir";

// ============================================================================
// EXPORT / IMPORT (backup de datos)
// ============================================================================
function exportData() {
  const all = {
    exported: new Date().toISOString(),
    version: 3,
    data: S
  };
  const blob = new Blob([JSON.stringify(all, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `fitness-backup-${ds(new Date())}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast("✓ Backup descargado");
}
function importData(input) {
  const file = input.files[0];
  if (!file) return;
  if (!confirm("Esto reemplazará TODOS tus datos actuales. ¿Continuar?")) {
    input.value = "";
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      const d = parsed.data || parsed;
      Object.keys(S).forEach(k => {
        if (d[k] !== undefined) {
          S[k] = d[k];
          save(k, S[k]);
        }
      });
      input.value = "";
      toast("✓ Datos restaurados");
      setTimeout(() => location.reload(), 600);
    } catch(e) {
      toast("❌ Archivo inválido");
      input.value = "";
    }
  };
  reader.readAsText(file);
}

function setNote(dateStr, val) {
  S.notes[dateStr] = val;
  save("notes", S.notes);
}

function toggleHydration(dateStr, n) {
  const cur = S.hydration[dateStr] || 0;
  S.hydration[dateStr] = (n === cur) ? n - 1 : n;
  save("hydration", S.hydration);
  refreshActiveScreen();
  updateHeader();
}

function selectDay(ts) {
  selDay = new Date(ts);
  renderPlan();
}

function logWeight() {
  const v = parseFloat(document.getElementById("inpW").value);
  if (!v || v < 30 || v > 300) { toast("Peso inválido"); return; }
  S.weights.push({ date: ds(TODAY), kg: v });
  save("weights", S.weights);
  document.getElementById("inpW").value = "";
  toast(`✓ ${v} kg guardado`);
  updateHeader();
}

function logEx() {
  const name = document.getElementById("inpExName").value.trim();
  const kg = document.getElementById("inpExKg").value;
  const reps = document.getElementById("inpExReps").value;
  if (!name) { toast("Escribe el ejercicio"); return; }
  S.eLogs.push({ date: ds(TODAY), name, kg, reps });
  save("eLogs", S.eLogs);
  document.getElementById("inpExName").value = "";
  document.getElementById("inpExKg").value = "";
  document.getElementById("inpExReps").value = "";

}

function logCardio() {
  const type = document.getElementById("inpCType").value;
  const dur = document.getElementById("inpCDur").value;
  if (!dur) { toast("Escribe los minutos"); return; }
  S.cLogs.push({ date: ds(TODAY), type, dur });
  save("cLogs", S.cLogs);
  document.getElementById("inpCDur").value = "";
  toast(`✓ ${type} ${dur} min`);
}

function logWellness() {
  const sleep = parseFloat(document.getElementById("inpSleep").value) || 0;
  if (!sleep && !_energy) { toast("Pon horas o energía"); return; }
  const arr = S.wellness.filter(x => x.date !== ds(TODAY));
  arr.push({ date: ds(TODAY), sleep, energy: _energy || 3 });
  S.wellness = arr;
  save("wellness", S.wellness);
  document.getElementById("inpSleep").value = "";
  _energy = 0;
  setEnergy(0);
  toast("✓ Día registrado");
}

function logMeasure() {
  const type = document.getElementById("inpMeasType").value;
  const val = parseFloat(document.getElementById("inpMeasVal").value);
  if (!val) { toast("Pon la medida"); return; }
  S.measure.push({ date: ds(TODAY), type, val });
  save("measure", S.measure);
  document.getElementById("inpMeasVal").value = "";
  toast(`✓ ${type} ${val}cm`);
}

function startTimer(secs) {
  timerLeft = secs;
  clearInterval(timerInterval);
  document.getElementById("restTimer").style.display = "flex";
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerLeft--;
    if (timerLeft <= 0) {
      clearTimer();
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      toast("⏱ Descanso terminado");
    } else {
      updateTimerDisplay();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = String(Math.floor(timerLeft / 60)).padStart(2, "0");
  const s = String(timerLeft % 60).padStart(2, "0");
  document.getElementById("timerDisplay").textContent = `${m}:${s}`;
}

function clearTimer() {
  clearInterval(timerInterval);
  timerLeft = 0;
  document.getElementById("restTimer").style.display = "none";
}

function openExModal(exId) {
  const ex = EX[exId];
  if (!ex) return;
  document.getElementById("modalTitle").textContent = ex.n;
  document.getElementById("modalBody").innerHTML = `
    ${bodyDiag(ex.mus)}
    <div style="margin-top:12px"><span class="badge-green">💪 ${esc(ex.m)}</span></div>
    <p style="margin-top:12px;font-size:14px;color:#CCC;line-height:1.75">${esc(ex.tip)}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px">
      <button class="btn" onclick="startTimer(60);closeModal()" style="padding:12px;font-size:13px">⏱ 60s</button>
      <button class="btn btn-pri" onclick="startTimer(90);closeModal()" style="padding:12px;font-size:13px">⏱ 90s</button>
    </div>
  `;
  document.getElementById("modal").classList.add("show");
}

function closeModal(ev) {
  if (ev && ev.target.id !== "modal") return;
  document.getElementById("modal").classList.remove("show");
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

function calcStreak() {
  let s = 0;
  const t = new Date(); t.setHours(0, 0, 0, 0);
  for (let i = 0; i < 60; i++) {
    const d = ds(addD(t, -i));
    const hasAct = (S.done[d] && S.done[d].length > 0) || S.cLogs.some(c => c.date === d);
    if (hasAct) s++;
    else if (i > 0) break;
  }
  return s;
}

function setTab(name) {
  activeTab = name;
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("screen-" + name).classList.add("active");
  document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add("active");
  refreshActiveScreen();
  window.scrollTo(0, 0);
}

function refreshActiveScreen() {
  if (activeTab === "hoy") renderHoy();
  else if (activeTab === "plan") renderPlan();
  else if (activeTab === "prog") renderProg();
  else if (activeTab === "log") renderLog();
}

function updateHeader() {
  TODAY = new Date();
  document.getElementById("dateText").textContent = TODAY.toLocaleDateString("es-ES", { weekday: "long", day: "numeric", month: "long" });
  const plan = getPlan(TODAY);
  const wb = document.getElementById("weekBadge");
  if (plan) {
    wb.textContent = "S" + (plan.weekN + 1);
    wb.style.display = "inline-block";
  } else {
    wb.style.display = "none";
  }
  const latest = S.weights.length > 0 ? S.weights[S.weights.length - 1].kg : 82;
  document.getElementById("weightDisplay").textContent = latest;
  const streak = calcStreak();
  if (streak > 0) {
    document.getElementById("streakNum").textContent = "🔥" + streak;
    document.getElementById("streakBadge").style.display = "flex";
  } else {
    document.getElementById("streakBadge").style.display = "none";
  }
}

updateHeader();
renderHoy();
renderLog(); // pre-render so inputs exist
showWorkoutTimer(); // recupera cronómetro si entreno en curso
