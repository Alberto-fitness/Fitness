<!DOCTYPE html>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --G: #A8E63D; --Gd: #6B9E1F; --Gbg: rgba(168,230,61,.12);
  --O: #F97316; --Obg: rgba(249,115,22,.12);
  --B: #60A5FA; --Bbg: rgba(96,165,250,.12);
  --P: #C084FC;
  --BG: #0A0A0A; --CARD: #161616; --BOR: #252525;
  --TXT: #FFFFFF; --MUT: #888888; --DIM: #2D2D2D;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--BG); color: var(--TXT); font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; }
body { padding-bottom: calc(84px + env(safe-area-inset-bottom)); padding-top: env(safe-area-inset-top); }
button, input, select, textarea { font-family: inherit; outline: none; }
input:focus, select:focus, textarea:focus { border-color: var(--G) !important; box-shadow: 0 0 0 2px rgba(168,230,61,.13); }
.card { background: var(--CARD); border-radius: 14px; border: 1px solid var(--BOR); padding: 14px 16px; margin-bottom: 10px; }
.lbl { font-size: 11px; color: var(--MUT); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 10px; text-transform: uppercase; }
.inp { width: 100%; background: #1E1E1E; border: 1px solid var(--BOR); border-radius: 10px; padding: 11px 14px; font-size: 14px; color: var(--TXT); }
.btn { cursor: pointer; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 400; background: var(--BOR); color: var(--TXT); }
.btn-pri { background: var(--G); color: #000; font-weight: 700; }
.btn-pri:active, .btn:active { transform: scale(.98); }
.header { background: #111; padding: 12px 16px; border-bottom: 1px solid var(--BOR); display: flex; justify-content: space-between; align-items: center; position: sticky; top: env(safe-area-inset-top); z-index: 50; }
.streak-badge { display: flex; flex-direction: column; align-items: center; background: rgba(255,215,0,.13); border: 1px solid rgba(255,215,0,.25); border-radius: 8px; padding: 3px 8px; }
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid var(--BOR); display: flex; z-index: 100; padding: 7px 0 calc(12px + env(safe-area-inset-bottom)); }
.tab-btn { flex: 1; background: none; border: none; cursor: pointer; color: var(--MUT); display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; padding: 2px 0; }
.tab-btn.active { color: var(--G); font-weight: 700; }
.tab-btn .ic { font-size: 21px; }
.screen { display: none; padding: 16px 16px 12px; }
.screen.active { display: block; }
.badge-green { background: var(--Gbg); color: var(--G); border: 1px solid rgba(107,158,31,.25); border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 700; }
.badge-orange { background: var(--Obg); color: var(--O); border: 1px solid rgba(249,115,22,.25); border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 700; }
.prog-bar { background: var(--BOR); border-radius: 4px; height: 8px; overflow: hidden; }
.prog-bar div { height: 100%; background: var(--G); border-radius: 4px; transition: .5s; }
.ex-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--BOR); cursor: pointer; }
.ex-check { width: 24px; height: 24px; border-radius: 12px; border: 2px solid #444; background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ex-check.done { background: var(--G); border-color: var(--G); color: #000; font-size: 12px; font-weight: 900; }
.ex-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ex-done .ex-name { opacity: 0.45; text-decoration: line-through; }
.ex-mus { font-size: 11px; color: var(--MUT); }
.ex-sets { font-size: 13px; color: var(--G); font-weight: 700; white-space: nowrap; }
.timer-card { background: var(--Obg); border: 1px solid rgba(249,115,22,.25); margin: 10px 16px 0; border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 200; display: none; align-items: flex-end; padding-bottom: env(safe-area-inset-bottom); }
.modal-bg.show { display: flex; }
.modal-box { background: #1C1C1C; border-radius: 18px 18px 0 0; padding: 20px; width: 100%; max-height: 88vh; overflow-y: auto; }
.day-cell { aspect-ratio: 1; border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 1.5px solid var(--BOR); }
.day-cell.F { background: #1A2E10; }
.day-cell.C, .day-cell.B { background: #2A1A0A; }
.day-cell.D { background: #1A1A1A; }
.day-cell.today { border-color: var(--O); }
.day-cell.sel { border-color: var(--G); }
.body-svg-wrap { display: flex; gap: 12px; justify-content: center; padding: 14px 0; background: #0F0F0F; border-radius: 12px; }
.body-svg-wrap > div { text-align: center; }
.body-svg-wrap svg { width: 110px; height: 220px; }
.body-svg-wrap .body-label { font-size: 9px; color: var(--MUT); margin-top: -8px; font-weight: 600; }
.toast { position: fixed; top: calc(70px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); background: var(--G); color: #000; padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 300; box-shadow: 0 4px 12px rgba(0,0,0,.3); opacity: 0; transition: .25s; pointer-events: none; }
.toast.show { opacity: 1; }
.chart-wrap { position: relative; height: 170px; margin-top: 16px; }
textarea { resize: vertical; min-height: 50px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div style="min-width:0">
    <div id="dateText" style="font-size:11px;color:var(--MUT);text-transform:capitalize"></div>
    <div style="font-size:17px;font-weight:800;letter-spacing:-0.5px">Mi Plan Fitness</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
    <div id="streakBadge" class="streak-badge" style="display:none">
      <div style="font-size:14px;font-weight:800;color:#FFD700"><span id="streakNum">0</span></div>
      <div style="font-size:8px;color:#FFD700">RACHA</div>
    </div>
    <span id="weekBadge" class="badge-green" style="display:none;padding:3px 8px;border-radius:8px;font-size:11px"></span>
    <div style="text-align:right">
      <div style="font-size:15px;font-weight:800;color:var(--G)"><span id="weightDisplay">82</span>kg</div>
      <div style="font-size:9px;color:var(--MUT)">→ 74kg</div>
    </div>
  </div>
</div>

<!-- REST TIMER -->
<div id="restTimer" class="timer-card" style="display:none">
  <div>
    <div style="font-size:10px;color:var(--O);font-weight:700;letter-spacing:1px">⏱ DESCANSO</div>
    <div id="timerDisplay" style="font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1">01:30</div>
  </div>
  <div style="display:flex;gap:6px">
    <button class="btn" onclick="startTimer(60)" style="padding:6px 10px;font-size:12px">60s</button>
    <button class="btn" onclick="startTimer(90)" style="padding:6px 10px;font-size:12px">90s</button>
    <button class="btn" onclick="clearTimer()" style="padding:6px 10px;font-size:12px;color:var(--MUT)">✕</button>
  </div>
</div>

<!-- SCREENS -->
<div class="screen active" id="screen-hoy"></div>
<div class="screen" id="screen-plan"></div>
<div class="screen" id="screen-prog"></div>
<div class="screen" id="screen-log"></div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="hoy" onclick="setTab('hoy')"><span class="ic">🏠</span><span>Hoy</span></button>
  <button class="tab-btn" data-tab="plan" onclick="setTab('plan')"><span class="ic">📅</span><span>Plan</span></button>
  <button class="tab-btn" data-tab="prog" onclick="setTab('prog')"><span class="ic">📈</span><span>Progreso</span></button>
  <button class="tab-btn" data-tab="log" onclick="setTab('log')"><span class="ic">✏️</span><span>Anotar</span></button>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;margin-bottom:14px;gap:8px">
      <div id="modalTitle" style="font-size:16px;font-weight:700;flex:1"></div>
      <button class="btn" onclick="closeModal()" style="width:30px;height:30px;padding:0;border-radius:8px;color:var(--MUT)">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================================
// DATA
// ============================================================================
const START = new Date(2026, 4, 11);
const G = "#A8E63D", Gd = "#6B9E1F", O = "#F97316", B = "#60A5FA", P = "#C084FC", DIM = "#2D2D2D", MUT = "#888888", BOR = "#252525";

const EX = {
  pressBanca: { n: "Press Banca con Mancuernas", m: "Pecho · Tríceps · Hombros", mus: ["chest","triceps","shoulders"], tip: "Túmbate en el banco, mancuernas al pecho con codos a 45°. Empuja explosivo hacia arriba. Escápulas apretadas contra el banco. Baja 3 segundos, sube rápido." },
  pressMilitar: { n: "Press Militar Mancuernas", m: "Hombros · Tríceps", mus: ["shoulders","triceps"], tip: "De pie o sentado, mancuernas a la altura de los hombros. Empuja directamente hacia arriba. Core activo, sin arquear la lumbar." },
  fondos: { n: "Fondos en Banco", m: "Tríceps · Hombros · Pecho", mus: ["triceps","shoulders","chest"], tip: "Manos en el borde del banco detrás del cuerpo, piernas estiradas. Baja hasta 90° de codo. Empuja. Mantén el cuerpo pegado al banco." },
  aperturas: { n: "Aperturas con Mancuernas", m: "Pecho · Hombros ant.", mus: ["chest","shoulders"], tip: "Tumbado en banco, baja con el codo ligeramente flexionado como si abrazaras un árbol. Siente el estiramiento profundo del pecho abajo." },
  triceps: { n: "Extensión Tríceps (Elástica)", m: "Tríceps", mus: ["triceps"], tip: "Elástica anclada en alto. Codos pegados al cuerpo y quietos. Extiende completamente. Aprieta el tríceps al final del movimiento." },
  sentadilla: { n: "Sentadilla Barra / Mancuernas", m: "Cuádriceps · Glúteos · Core", mus: ["quads","glutes","abs"], tip: "Pies a anchura de hombros, puntas ligeramente abiertas. Baja hasta muslos paralelos. Rodillas siguen la línea de los pies. Empuja con los talones." },
  pesoMuerto: { n: "Peso Muerto Rumano", m: "Isquios · Glúteos · Lumbar", mus: ["hamstrings","glutes","back"], tip: "Espalda neutra. Desliza las mancuernas por las piernas llevando las caderas atrás. Siente el estiramiento en isquios. Empuja caderas adelante para subir." },
  zancadas: { n: "Zancadas con Mancuernas", m: "Cuádriceps · Glúteos", mus: ["quads","glutes"], tip: "Paso largo adelante, rodilla trasera casi toca el suelo. Rodilla delantera no pasa el pie. Empuja con el talón delantero para volver." },
  swing: { n: "Swing Kettlebell", m: "Glúteos · Isquios · Core", mus: ["glutes","hamstrings","abs","back"], tip: "Impulso desde las caderas, no los brazos. Flexiona rodillas, pasa la kettlebell entre piernas. Extiende caderas explosivamente. Aprieta glúteos en la cima." },
  plancha: { n: "Plancha", m: "Core · Lumbar · Estabilizadores", mus: ["abs","back"], tip: "Cuerpo recto de cabeza a talones. No caigas de caderas ni subas el trasero. Aprieta abdomen, glúteos y cuádriceps. Respira controlado." },
  crunch: { n: "Crunch Bicicleta", m: "Abdomen · Oblicuos", mus: ["abs"], tip: "Codo derecho a rodilla izquierda y viceversa. Lento y controlado, sin tirar del cuello con las manos." },
  dominadas: { n: "Dominadas en Barra", m: "Espalda · Bíceps · Core", mus: ["back","biceps","abs"], tip: "Si no aguantas el peso corporal, usa la elástica de ayuda. Baja completamente entre reps. Tira los codos hacia las caderas para subir." },
  remo: { n: "Remo con Mancuerna", m: "Espalda · Bíceps", mus: ["back","biceps"], tip: "Apoya mano y rodilla contraria en el banco. Espalda paralela al suelo. Tira hacia la cadera (no el hombro). Aprieta la espalda arriba." },
  curl: { n: "Curl Bíceps Mancuernas", m: "Bíceps", mus: ["biceps"], tip: "Codos pegados al cuerpo y quietos. Sube 2 segundos, baja 3 segundos. Rango completo. Supina la muñeca al subir." },
  facePull: { n: "Face Pull (Elástica)", m: "Hombro post. · Manguito", mus: ["shoulders","back"], tip: "Elástica a la altura de la cara. Codos en alto. Tira hacia atrás separando las manos. Fundamental para la salud del hombro." },
  encog: { n: "Encogimientos de Hombros", m: "Trapecios", mus: ["traps"], tip: "Sube hombros hacia las orejas, mantén 1-2 segundos arriba. Baja lento y controlado. Sin girar los hombros." },
};

const PLAN = [
  { type: "F", label: "Tren Superior – Empuje", ex: [{id:"pressBanca",s:4,r:"10"},{id:"pressMilitar",s:3,r:"12"},{id:"fondos",s:3,r:"12"},{id:"aperturas",s:3,r:"15"},{id:"triceps",s:3,r:"15"}] },
  { type: "C", label: "Cardio – Correr" },
  { type: "D", label: "Descanso activo" },
  { type: "F", label: "Tren Inferior + Core", ex: [{id:"sentadilla",s:4,r:"10"},{id:"pesoMuerto",s:4,r:"10"},{id:"zancadas",s:3,r:"12c/p"},{id:"swing",s:3,r:"15"},{id:"plancha",s:3,r:"45s"},{id:"crunch",s:3,r:"20"}] },
  { type: "F", label: "Tren Superior – Tirón", ex: [{id:"dominadas",s:4,r:"máx."},{id:"remo",s:4,r:"10c/p"},{id:"curl",s:3,r:"12"},{id:"facePull",s:3,r:"15"},{id:"encog",s:3,r:"15"}] },
  { type: "B", label: "Cardio – Bici suave" },
  { type: "D", label: "Descanso total" },
];

const CARDIO = ["1 min corriendo / 2 min caminando × 10 rondas (30 min)","1 min corriendo / 2 min caminando × 10 rondas (30 min)","2 min corriendo / 1 min caminando × 8 rondas (24 min)","2 min corriendo / 1 min caminando × 8 rondas (24 min)","3 min corriendo / 1 min caminando × 6 rondas (24 min)","3 min corriendo / 1 min caminando × 6 + intenta 20 min seguidos","25–30 min corriendo sin parar 🎉","30 min corriendo sin parar 🏆"];
const BIKE = ["30 min suave","30 min suave","35 min suave-moderado","35 min moderado","40 min moderado","40 min moderado-alto","45 min moderado-alto","45 min alto"];

const MEAL_TPL = {
  F: { d:"🍳 Huevos + 🥣 Avena + 🍌 Fruta", mm:"🥛 Yogur griego + frutos secos", c:"🍗 Proteína (pollo/pavo/pescado) + 🍚 Arroz o patata + 🥗 Verdura", m:"🍎 Fruta o barrita proteica", s:"🥤 Gold Whey 1 cacito + 5g creatina (post-entreno, 30 min)", ce:"🐟 Pescado o carne magra + 🥗 Verdura + algo de carbo" },
  C: { d:"🍳 Huevos + 🥣 Avena + 🍌 Fruta", mm:"🥛 Yogur griego + frutos secos", c:"🍗 Proteína + 🍚 Arroz o patata + 🥗 Verdura", m:"🍎 Fruta", s:"🥤 Gold Whey 1 cacito + 5g creatina (post-cardio)", ce:"🐟 Pescado o carne + 🥗 Verdura + boniato" },
  D: { d:"🍳 Huevos + 🥑 Aguacate + tostada integral", mm:"🍎 Fruta + puñado frutos secos", c:"🥩 Carne magra o pescado + 🥗 Verdura + carbo moderado", m:"🥛 Yogur griego + fruta", s:"💊 5g creatina con agua o zumo", ce:"🐟 Pescado blanco + 🥗 Verdura" },
};
MEAL_TPL.B = MEAL_TPL.C;

const DOW_S = ["L","M","X","J","V","S","D"];

// ============================================================================
// HELPERS
// ============================================================================
function wn(d) { return Math.floor((new Date(d) - START) / (7 * 86400000)); }
function dow(d) { const x = new Date(d).getDay(); return x === 0 ? 6 : x - 1; }
function ds(d) { return new Date(d).toISOString().split("T")[0]; }
function addD(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function getPlan(date) {
  const w = wn(date); if (w < 0 || w > 7) return null;
  return { ...PLAN[dow(date)], weekN: w, dow: dow(date) };
}
function esc(s) { return String(s || "").replace(/[<>"']/g, c => ({ '<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

// ============================================================================
// STORAGE (localStorage = persistente en iPhone)
// ============================================================================
const S = {
  weights: JSON.parse(localStorage.getItem("fw") || "[]"),
  eLogs: JSON.parse(localStorage.getItem("fe") || "[]"),
  cLogs: JSON.parse(localStorage.getItem("fc") || "[]"),
  wellness: JSON.parse(localStorage.getItem("fwell") || "[]"),
  measure: JSON.parse(localStorage.getItem("fmeas") || "[]"),
  done: JSON.parse(localStorage.getItem("fd") || "{}"),
  notes: JSON.parse(localStorage.getItem("fn") || "{}"),
  hydration: JSON.parse(localStorage.getItem("fh") || "{}"),
};
function save(key, val) {
  const map = { weights:"fw", eLogs:"fe", cLogs:"fc", wellness:"fwell", measure:"fmeas", done:"fd", notes:"fn", hydration:"fh" };
  localStorage.setItem(map[key], JSON.stringify(val));
}

// ============================================================================
// STATE
// ============================================================================
let TODAY = new Date();
let selDay = new Date(2026, 4, 11);
let activeTab = "hoy";
let timerLeft = 0, timerInterval = null;
let chartW = null, chartC = null;

// ============================================================================
// BODY DIAGRAM (SVG)
// ============================================================================
function bodyDiag(muscles) {
  const f = (m) => muscles.includes(m) ? G : DIM;
  return `
  <div class="body-svg-wrap">
    <div>
      <svg viewBox="0 0 100 200">
        <circle cx="50" cy="16" r="11" fill="#1F1F1F" stroke="#555" stroke-width="0.6"/>
        <rect x="46" y="26" width="8" height="6" fill="#1F1F1F"/>
        <path d="M 41 32 L 30 40 L 50 38 L 70 40 L 59 32 Z" fill="${f('traps')}"/>

        <line x1="50" y1="50" x2="50" y2="74" stroke="#000" stroke-width="0.5" opacity="0.4"/>
        <rect x="42" y="74" width="16" height="36" fill="${f('abs')}" rx="2"/>
        <line x1="50" y1="76" x2="50" y2="108" stroke="#000" stroke-width="0.4" opacity="0.4"/>
        <line x1="42" y1="86" x2="58" y2="86" stroke="#000" stroke-width="0.3" opacity="0.3"/>
        <line x1="42" y1="96" x2="58" y2="96" stroke="#000" stroke-width="0.3" opacity="0.3"/>
        <ellipse cx="20" cy="60" rx="6" ry="13" fill="${f('biceps')}"/>
        <ellipse cx="80" cy="60" rx="6" ry="13" fill="${f('biceps')}"/>
        <ellipse cx="17" cy="84" rx="5" ry="13" fill="#1F1F1F"/>
        <ellipse cx="83" cy="84" rx="5" ry="13" fill="#1F1F1F"/>
        <ellipse cx="42" cy="128" rx="8" ry="22" fill="${f('quads')}"/>
        <ellipse cx="58" cy="128" rx="8" ry="22" fill="${f('quads')}"/>
        <ellipse cx="42" cy="170" rx="6" ry="16" fill="#1F1F1F"/>
        <ellipse cx="58" cy="170" rx="6" ry="16" fill="#1F1F1F"/>
      </svg>
      <div class="body-label">FRONTAL</div>
    </div>
    <div>
      <svg viewBox="0 0 100 200">
        <circle cx="50" cy="16" r="11" fill="#1F1F1F" stroke="#555" stroke-width="0.6"/>
        <path d="M 38 30 Q 50 27 62 30 L 64 50 L 50 47 L 36 50 Z" fill="${f('traps')}"/>
        <ellipse cx="28" cy="44" rx="9" ry="8" fill="${f('shoulders')}"/>
        <ellipse cx="72" cy="44" rx="9" ry="8" fill="${f('shoulders')}"/>
        <path d="M 36 50 L 28 78 L 40 88 L 44 65 Z" fill="${f('back')}"/>
        <path d="M 64 50 L 72 78 L 60 88 L 56 65 Z" fill="${f('back')}"/>
        <rect x="42" y="48" width="16" height="50" fill="${f('back')}"/>
        <ellipse cx="20" cy="60" rx="6" ry="13" fill="${f('triceps')}"/>
        <ellipse cx="80" cy="60" rx="6" ry="13" fill="${f('triceps')}"/>
        <ellipse cx="17" cy="84" rx="5" ry="13" fill="#1F1F1F"/>
        <ellipse cx="83" cy="84" rx="5" ry="13" fill="#1F1F1F"/>

function hydrationCard(dateStr) {
  const glasses = S.hydration[dateStr] || 0;
  let html = `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span class="lbl">💧 Hidratación</span>
      <span style="font-size:14px;font-weight:700;color:var(--B)">${glasses}/8 vasos</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:6px">`;
  for (let i = 0; i < 8; i++) {
    const filled = i < glasses;
    html += `<button onclick="toggleHydration('${dateStr}',${i+1})" style="aspect-ratio:1;border-radius:8px;border:1.5px solid ${filled?'var(--B)':'var(--BOR)'};background:${filled?'rgba(96,165,250,.12)':'transparent'};cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0">${filled?'💧':''}</button>`;
  }
  html += `</div><div style="font-size:11px;color:var(--MUT);margin-top:8px">~250ml/vaso · objetivo 2L. Imprescindible para perder grasa</div></div>`;
  return html;
}

function workoutCard(plan, dateStr) {
  const doneIds = S.done[dateStr] || [];
  if (plan.type === "F") {
    const total = plan.ex.length;
    const nDone = doneIds.filter(x => plan.ex.find(e => e.id === x)).length;
    const allDone = nDone === total && total > 0;
    let html = `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span class="badge-green">💪 ${esc(plan.label)}</span>
        <span style="font-size:12px;color:${allDone?'var(--G)':'var(--MUT)'};font-weight:${allDone?700:400}">${allDone?'✓ Completado':nDone+'/'+total}</span>
      </div>
      <div class="prog-bar" style="margin-bottom:12px"><div style="width:${total?Math.round(nDone/total*100):0}%"></div></div>`;
    plan.ex.forEach(ex => {
      const info = EX[ex.id];
      const isDone = doneIds.includes(ex.id);
      html += `<div class="ex-row ${isDone?'ex-done':''}" onclick="openExModal('${ex.id}')">
        <div class="ex-check ${isDone?'done':''}" onclick="event.stopPropagation();toggleDone('${dateStr}','${ex.id}')">${isDone?'✓':''}</div>
        <div style="flex:1;min-width:0">
          <div class="ex-name">${esc(info.n)}</div>
          <div class="ex-mus">${esc(info.m)}</div>
        </div>
        <span class="ex-sets">${ex.s}×${ex.r}</span>
        <span style="color:#444">›</span>
      </div>`;
    });
    html += `<div style="margin-top:12px">
      <textarea class="inp" placeholder="¿Cómo te ha ido el entreno? (opcional)" rows="2" oninput="setNote('${dateStr}', this.value)" style="font-size:13px">${esc(S.notes[dateStr]||'')}</textarea>
    </div></div>`;
    return html;
  }
  if (plan.type === "C" || plan.type === "B") {
    const prog = plan.weekN < 8 ? (plan.type === "C" ? CARDIO[plan.weekN] : BIKE[plan.weekN]) : "";
    return `<div class="card">
      <span class="badge-orange">${plan.type==='C'?'🏃':'🚴'} ${esc(plan.label)}</span>
      <div style="margin-top:12px;background:#1E1A14;border-radius:10px;padding:14px">
        <div style="font-size:11px;color:var(--O);font-weight:700;margin-bottom:4px">SEMANA ${plan.weekN+1}</div>
        <div style="font-size:14px;line-height:1.6;color:#EEE">${esc(prog)}</div>
      </div>
      ${plan.type==='C'?'<div style="font-size:12px;color:var(--MUT);margin-top:8px">Calienta 5 min · Enfría 5 min caminando</div>':''}
      <div style="margin-top:10px"><textarea class="inp" placeholder="¿Cómo te has sentido?" rows="2" oninput="setNote('${dateStr}', this.value)" style="font-size:13px">${esc(S.notes[dateStr]||'')}</textarea></div>
    </div>`;
  }
  return `<div class="card"><div style="text-align:center;padding:12px 0">
    <div style="font-size:38px;margin-bottom:6px">${plan.dow===6?'😴':'🧘'}</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:4px">${esc(plan.label)}</div>
    <div style="font-size:13px;color:var(--MUT)">Estiramientos, paseo suave o yoga. Recuperación = progreso</div>
  </div></div>`;
}

function shakeCard(plan) {
  const isRest = plan.type === "D";
  const color = isRest ? "var(--O)" : "var(--G)";
  const bgc = isRest ? "var(--Obg)" : "var(--Gbg)";
  const borCol = isRest ? "rgba(249,115,22,.25)" : "rgba(107,158,31,.25)";
  return `<div class="card" style="background:${bgc};border:1px solid ${borCol}">
    <div style="font-size:11px;color:${color};font-weight:700;letter-spacing:0.5px;margin-bottom:4px">${isRest?'💊 CREATINA (DÍA DESCANSO)':'🥤 BATIDO POST-ENTRENO'}</div>
    <div style="font-size:13px;color:#CCC;line-height:1.6">${isRest?'5g creatina con agua o zumo · Cualquier momento':'1 cacito Gold Whey + 5g creatina + 250ml agua o leche desnatada · 30 min después de acabar'}</div>
  </div>`;
}

function mealCard(tplKey) {
  const meals = MEAL_TPL[tplKey] || MEAL_TPL.D;
  const rows = [["Desayuno", meals.d], ["Media mañana", meals.mm], ["Comida", meals.c], ["Merienda", meals.m], ["Batido", meals.s], ["Cena", meals.ce]];
  let html = `<div class="card"><div class="lbl">🍽️ Comidas hoy</div>`;
  rows.forEach(([l, v], i) => {
    const isShake = l === "Batido";
    const borderB = i < rows.length - 1 ? "border-bottom:1px solid var(--BOR)" : "";
    html += `<div style="display:flex;gap:10px;padding:8px 0;${borderB};align-items:flex-start">
      <div style="font-size:11px;width:88px;flex-shrink:0;padding-top:1px;font-weight:${isShake?700:400};color:${isShake?'var(--G)':'var(--MUT)'}">${l}</div>
      <div style="font-size:13px;line-height:1.5;color:${isShake?'#C8F06A':'#DDD'}">${esc(v)}</div>
    </div>`;
  });
  html += `<div style="margin-top:10px;padding:8px 10px;background:#0F1F05;border-radius:8px;font-size:11px;color:var(--Gd)">🎯 Sin gramos. Porciones razonables · proteína cada comida (palma de mano) · déficit ligero</div></div>`;
  return html;
}

  const pct = Math.min(100, Math.round(lost / 8 * 100));
  const weekAgo = addD(new Date(), -7);
  const thisWeekCardio = S.cLogs.filter(c => new Date(c.date) >= weekAgo).reduce((a, c) => a + (parseInt(c.dur) || 0), 0);

  const streak = calcStreak();

  });

      <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--O)">${thisWeekCardio}</div><div style="font-size:10px;color:var(--MUT)">MIN CARDIO</div></div>
      <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:#FFD700">🔥 ${streak}</div><div style="font-size:10px;color:var(--MUT)">RACHA</div></div>

  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
    <div class="card" style="margin-bottom:0"><div style="font-size:11px;color:var(--MUT);margin-bottom:4px">Peso actual</div><div style="font-size:22px;font-weight:800">${latest} kg</div><div style="font-size:11px;color:var(--MUT)">→ 74 kg</div></div>
    <div class="card" style="margin-bottom:0"><div style="font-size:11px;color:var(--MUT);margin-bottom:4px">Perdido</div><div style="font-size:22px;font-weight:800;color:var(--G)">${lost} kg</div><div style="font-size:11px;color:var(--MUT)">Quedan ${remain} kg</div></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:12px;color:var(--MUT)">Progreso al objetivo</span>
      <span style="font-size:12px;font-weight:700;color:var(--G)">${pct}%</span>
    </div>
    <div class="prog-bar"><div style="width:${pct}%"></div></div>
    <div class="chart-wrap">
      ${S.weights.length > 1 ? '<canvas id="weightChart"></canvas>' : '<div style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--MUT);font-size:13px"><span style="font-size:28px">📊</span>Registra tu primer peso en Anotar</div>'}
    </div>
  </div>
  <div class="card"><div class="lbl">🏆 Récords personales</div>`;
  if (prList.length > 0) {
    prList.forEach((pr, i) => {
      const borderB = i < prList.length - 1 ? "border-bottom:1px solid var(--BOR)" : "";
      html += `<div style="display:flex;gap:8px;padding:7px 0;${borderB};font-size:13px">

    html += `<div style="text-align:center;color:var(--MUT);font-size:13px;padding:12px 0">Registra sueño y energía cada día</div>`;
  }
  html += `</div>`;

  // Cardio
  html += `<div class="card"><div class="lbl">🏃 Cardio</div>`;

    html += `<div style="text-align:center;color:var(--MUT);font-size:13px;padding:12px 0">Anota tu cardio en Anotar</div>`;

  html += `</div>`;

  document.getElementById("screen-prog").innerHTML = html;

  setTimeout(() => {
    if (chartW) { chartW.destroy(); chartW = null; }

        type: "line",
        data: {

          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: MUT, font: { size: 9 } }, grid: { color: BOR } }, x: { ticks: { color: MUT, font: { size: 9 }, maxRotation: 45 }, grid: { display: false } } } }
      });
    }
    const cCanvas = document.getElementById("cinturaChart");
    if (cCanvas && cinturaLogs.length > 0) {
      chartC = new Chart(cCanvas, {
        type: "line",
        data: { labels: cinturaLogs.map(m => m.date.slice(5)), datasets: [{ data: cinturaLogs.map(m => m.val), borderColor: P, backgroundColor: "rgba(192,132,252,.1)", borderWidth: 2, pointRadius: 3, pointBackgroundColor: P, tension: 0.3, fill: true }] },

  }, 50);
}

        <input class="inp" type="number" id="inpExKg" placeholder="Kg" step="0.5" style="flex:1">
        <span style="color:var(--MUT);display:flex;align-items:center;font-size:14px">×</span>
        <input class="inp" type="number" id="inpExReps" placeholder="Reps" min="1" style="flex:1">
      </div>
    </div>
    <button class="btn btn-pri" onclick="logEx()" style="width:100%;margin-top:8px">Guardar carga</button>
  </div>
  <div class="card">
    <div class="lbl">🏃 Cardio</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <select class="inp" id="inpCType" style="appearance:none">
        <option>Correr</option><option>Bici</option><option>Otro</option>
      </select>
      <div style="display:flex;gap:8px;align-items:center">
        <input class="inp" type="number" id="inpCDur" placeholder="Minutos" min="1" max="300" style="flex:1">
        <span style="color:var(--MUT);font-size:14px">min</span>
      </div>
    </div>
    <button class="btn btn-pri" onclick="logCardio()" style="width:100%;margin-top:8px">Guardar cardio</button>
  </div>
  <div class="card">
    <div class="lbl">⏱ Temporizador descanso</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <button class="btn" onclick="startTimer(60)" style="padding:10px 0;font-size:13px">1 min</button>
      <button class="btn btn-pri" onclick="startTimer(90)" style="padding:10px 0;font-size:13px">1:30</button>
      <button class="btn" onclick="startTimer(120)" style="padding:10px 0;font-size:13px">2 min</button>
    </div>
  </div>`;
  document.getElementById("screen-log").innerHTML = html;
}

// ============================================================================
// ACTIONS
// ============================================================================
let _energy = 0;
function setEnergy(n) {
  _energy = n;
  document.querySelectorAll('#energyStars button').forEach((b, i) => {
    const filled = i < n;
    b.textContent = filled ? '★' : '☆';
    b.style.color = filled ? '#FFD700' : 'var(--MUT)';
    b.style.background = filled ? 'rgba(255,215,0,.13)' : 'var(--BOR)';
    b.style.border = filled ? '1px solid #FFD700' : '1px solid var(--BOR)';
  });
}

function toggleDone(dateStr, exId) {
  const cur = S.done[dateStr] || [];
  if (cur.includes(exId)) {
    S.done[dateStr] = cur.filter(x => x !== exId);
  } else {
    S.done[dateStr] = [...cur, exId];
    startTimer(90);
  }
  save("done", S.done);
  refreshActiveScreen();
}

function setNote(dateStr, val) {
  S.notes[dateStr] = val;
  save("notes", S.notes);
}

function toggleHydration(dateStr, n) {
  const cur = S.hydration[dateStr] || 0;
  S.hydration[dateStr] = (n === cur) ? n - 1 : n;
  save("hydration", S.hydration);
  refreshActiveScreen();
  updateHeader();
}

function selectDay(ts) {
  selDay = new Date(ts);
  renderPlan();
}

function logWeight() {
  const v = parseFloat(document.getElementById("inpW").value);
  if (!v || v < 30 || v > 300) { toast("Peso inválido"); return; }
  S.weights.push({ date: ds(TODAY), kg: v });
  save("weights", S.weights);
  document.getElementById("inpW").value = "";
  toast(`✓ ${v} kg guardado`);
  updateHeader();
}

function logEx() {
  const name = document.getElementById("inpExName").value.trim();
  const kg = document.getElementById("inpExKg").value;
  const reps = document.getElementById("inpExReps").value;
  if (!name) { toast("Escribe el ejercicio"); return; }
  S.eLogs.push({ date: ds(TODAY), name, kg, reps });
  save("eLogs", S.eLogs);
  document.getElementById("inpExName").value = "";
  document.getElementById("inpExKg").value = "";
  document.getElementById("inpExReps").value = "";
  toast("✓ Carga guardada");
}

function logCardio() {
  const type = document.getElementById("inpCType").value;
  const dur = document.getElementById("inpCDur").value;
  if (!dur) { toast("Escribe los minutos"); return; }
  S.cLogs.push({ date: ds(TODAY), type, dur });
  save("cLogs", S.cLogs);
  document.getElementById("inpCDur").value = "";
  toast(`✓ ${type} ${dur} min`);
}

function logWellness() {
  const sleep = parseFloat(document.getElementById("inpSleep").value) || 0;
  if (!sleep && !_energy) { toast("Pon horas o energía"); return; }
  const arr = S.wellness.filter(x => x.date !== ds(TODAY));
  arr.push({ date: ds(TODAY), sleep, energy: _energy || 3 });
  S.wellness = arr;
  save("wellness", S.wellness);
  document.getElementById("inpSleep").value = "";
  _energy = 0;
  setEnergy(0);
  toast("✓ Día registrado");
}

function logMeasure() {
  const type = document.getElementById("inpMeasType").value;
  const val = parseFloat(document.getElementById("inpMeasVal").value);
  if (!val) { toast("Pon la medida"); return; }
  S.measure.push({ date: ds(TODAY), type, val });
  save("measure", S.measure);
  document.getElementById("inpMeasVal").value = "";
  toast(`✓ ${type} ${val}cm`);
}

function startTimer(secs) {
  timerLeft = secs;
  clearInterval(timerInterval);
  document.getElementById("restTimer").style.display = "flex";
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerLeft--;
    if (timerLeft <= 0) {
      clearTimer();
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      toast("⏱ Descanso terminado");
    } else {
      updateTimerDisplay();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = String(Math.floor(timerLeft / 60)).padStart(2, "0");
  const s = String(timerLeft % 60).padStart(2, "0");
  document.getElementById("timerDisplay").textContent = `${m}:${s}`;
}

function clearTimer() {
  clearInterval(timerInterval);
  timerLeft = 0;
  document.getElementById("restTimer").style.display = "none";
}

function openExModal(exId) {
  const ex = EX[exId];
  if (!ex) return;
  document.getElementById("modalTitle").textContent = ex.n;
  document.getElementById("modalBody").innerHTML = `
    ${bodyDiag(ex.mus)}
    <div style="margin-top:12px"><span class="badge-green">💪 ${esc(ex.m)}</span></div>
    <p style="margin-top:12px;font-size:14px;color:#CCC;line-height:1.75">${esc(ex.tip)}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px">
      <button class="btn" onclick="startTimer(60);closeModal()" style="padding:12px;font-size:13px">⏱ 60s</button>
      <button class="btn btn-pri" onclick="startTimer(90);closeModal()" style="padding:12px;font-size:13px">⏱ 90s</button>
    </div>
  `;
  document.getElementById("modal").classList.add("show");
}

function closeModal(ev) {
  if (ev && ev.target.id !== "modal") return;
  document.getElementById("modal").classList.remove("show");
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

function calcStreak() {
  let s = 0;
  const t = new Date(); t.setHours(0, 0, 0, 0);
  for (let i = 0; i < 60; i++) {
    const d = ds(addD(t, -i));
    const hasAct = (S.done[d] && S.done[d].length > 0) || S.cLogs.some(c => c.date === d);
    if (hasAct) s++;
    else if (i > 0) break;
  }
  return s;
}

function setTab(name) {
  activeTab = name;
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("screen-" + name).classList.add("active");
  document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add("active");
  refreshActiveScreen();
  window.scrollTo(0, 0);
}

function refreshActiveScreen() {
  if (activeTab === "hoy") renderHoy();
  else if (activeTab === "plan") renderPlan();
  else if (activeTab === "prog") renderProg();
  else if (activeTab === "log") renderLog();
}

function updateHeader() {
  TODAY = new Date();
  document.getElementById("dateText").textContent = TODAY.toLocaleDateString("es-ES", { weekday: "long", day: "numeric", month: "long" });
  const plan = getPlan(TODAY);
  const wb = document.getElementById("weekBadge");
  if (plan) {
    wb.textContent = "S" + (plan.weekN + 1);
    wb.style.display = "inline-block";
  } else {
    wb.style.display = "none";
  }
  const latest = S.weights.length > 0 ? S.weights[S.weights.length - 1].kg : 82;
  document.getElementById("weightDisplay").textContent = latest;
  const streak = calcStreak();
  if (streak > 0) {
    document.getElementById("streakNum").textContent = "🔥" + streak;
    document.getElementById("streakBadge").style.display = "flex";
  } else {
    document.getElementById("streakBadge").style.display = "none";
  }
}

// ============================================================================
// INIT
// ============================================================================
updateHeader();
renderHoy();
renderLog(); // pre-render so inputs exist
</script>
</body>
</html>
